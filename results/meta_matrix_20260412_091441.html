<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MTG Legacy Meta Matrix — 38 Decks</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c0e14;--bg2:#12151e;--bg3:#181c28;--bg4:#1e2333;--tx:#c8cdd8;--tx2:#8891a4;--tx3:#5a6270;
--acc:#60a5fa;--grn:#4ade80;--red:#f87171;--orn:#d97706;--pur:#a78bfa;--cyn:#22d3ee;--gold:#c9a227}
body{background:var(--bg);color:var(--tx);font-family:'Outfit',sans-serif;font-size:13px;overflow-x:hidden}
.wrap{display:flex;height:100vh}
.main{flex:1;overflow:auto;padding:16px 20px}
.det{width:400px;min-width:400px;background:var(--bg2);border-left:1px solid #ffffff0a;overflow-y:auto;
transform:translateX(100%);transition:transform .25s ease;position:relative}
.det.show{transform:translateX(0)}
.det-inner{padding:20px}
h1{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:2px}
.sub-h{color:var(--tx2);font-size:12px;margin-bottom:16px}
.ctrls{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.ctrls label{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px}
.ctrls select,.ctrls input{background:var(--bg3);border:1px solid #ffffff10;color:var(--tx);
padding:5px 8px;border-radius:4px;font-size:12px;font-family:'JetBrains Mono',monospace}
.ctrls input{width:130px}
.tiers{margin-bottom:14px}
.tier-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin:8px 0 4px;
padding:2px 6px;border-radius:2px;display:inline-block}
.tier-label.t1{color:#4ade80;background:#4ade8015}
.tier-label.t2{color:#60a5fa;background:#60a5fa15}
.tier-label.t3{color:#d97706;background:#d9770615}
.tier-label.t4{color:#f87171;background:#f8717115}
.tier-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:2px}
.rchip{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 7px;border-radius:3px;
cursor:pointer;transition:all .15s;white-space:nowrap;border:1px solid transparent}
.rchip:hover{border-color:#ffffff30;transform:translateY(-1px)}
.rchip.sel{border-color:var(--acc);box-shadow:0 0 8px #60a5fa30}
table{border-collapse:collapse;font-family:'JetBrains Mono',monospace;font-size:10px}
th,td{padding:0;text-align:center}
th.ch{height:90px;position:relative;min-width:26px}
th.ch div{position:absolute;bottom:4px;left:50%;transform:rotate(-55deg) translateX(-50%);
transform-origin:bottom left;white-space:nowrap;font-size:8px;color:var(--tx2);font-weight:400;cursor:pointer}
th.ch.hl div{color:var(--acc);font-weight:600}
th.rh{text-align:right;padding-right:6px;font-size:8px;color:var(--tx2);font-weight:400;
white-space:nowrap;cursor:pointer;position:sticky;left:0;background:var(--bg);z-index:1}
th.rh.hl{color:var(--acc);font-weight:600}
td.c{width:26px;height:20px;font-size:9px;font-weight:600;cursor:pointer;transition:opacity .1s;position:relative}
td.c:hover{outline:2px solid #fff;outline-offset:-2px;z-index:2}
td.c.sel{outline:2px solid var(--acc);outline-offset:-2px;z-index:3}
td.mir{background:var(--bg3)!important;color:var(--tx3);cursor:default;font-size:8px}
td.avg{font-size:9px;font-weight:700;padding-left:6px;background:var(--bg);position:sticky;right:0}
.ttip{position:fixed;background:#1a1e2e;border:1px solid #ffffff20;border-radius:6px;padding:8px 12px;
pointer-events:none;z-index:100;font-size:11px;box-shadow:0 8px 24px rgba(0,0,0,.5);
opacity:0;transition:opacity .12s;max-width:260px}
.ttip.vis{opacity:1}
.ttip .tw{font-size:18px;font-weight:700;margin-bottom:2px}
.ttip .tl{color:var(--tx2);font-size:10px}
.legend{display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:10px;color:var(--tx3)}
.legend-bar{height:12px;width:200px;border-radius:3px;
background:linear-gradient(90deg,hsl(0,55%,20%),hsl(24,45%,25%),hsl(60,35%,24%),hsl(100,45%,24%),hsl(140,50%,26%))}
.close-btn{position:sticky;top:0;right:0;z-index:10;background:var(--bg2);padding:12px 16px;
display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #ffffff08}
.close-btn button{background:none;border:1px solid #ffffff15;color:var(--tx2);width:28px;height:28px;
border-radius:4px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.close-btn button:hover{background:var(--bg4);color:var(--tx)}
.det h2{font-size:16px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px}
.det .sub{color:var(--tx2);font-size:11px;margin-bottom:10px}
.sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--tx3);
margin:18px 0 8px;padding-bottom:4px;border-bottom:1px solid #ffffff08}
.mu-row{display:flex;align-items:center;gap:5px;padding:2px 0;cursor:pointer}
.mu-row:hover{background:#ffffff05}
.mu-name{width:100px;font-size:9px;color:var(--tx2);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mu-bar{flex:1;height:9px;background:var(--bg);border-radius:2px;overflow:hidden;max-width:120px}
.mu-fill{height:100%;border-radius:2px}
.mu-val{font-size:10px;font-weight:600;width:32px;text-align:right;font-family:'JetBrains Mono',monospace}
.tier-badge{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;
border-radius:4px;font-size:12px;font-weight:700;margin-right:8px}
.row{display:flex;justify-content:space-between;padding:3px 0;font-size:12px}
.lbl{color:var(--tx2)}.val{font-family:'JetBrains Mono',monospace;font-weight:600}
</style></head><body>

const I={};
const C={};
const ARCH={"affinity":"prison","belcher":"combo","boros":"prison","bug":"tempo","burn":"aggro","cephalid":"combo","cloudpost":"prison","depths":"combo","dimir":"other","dimir_b":"other","dimir_flash":"other","dnt":"prison","doomsday":"combo","eight_cast":"prison","eldrazi":"aggro","elves":"aggro","goblins":"aggro","infect":"combo","lands":"other","mardu":"aggro","mono_black":"aggro","ocelot":"aggro","oops":"combo","painter":"combo","prison":"prison","reanimator":"combo","show":"combo","sneak_a":"combo","sneak_b":"combo","storm":"combo","tes":"combo","ur_aggro":"aggro","ur_delver":"aggro","ur_tempo":"aggro","uwx":"control","wan_shi_tong":"prison"};
const decks=D.d,M=D.m,A=D.a,W=D.w||{};
let sorted=[...decks],filt='',archFilt='',hlDeck='',selCell=null,selDeck=null,useWeighted=true;
const hl=document.getElementById('hl');
decks.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;hl.appendChild(o)});

function getWR(d){return useWeighted?(W[d]||A[d]):A[d]}
function getCT(){return useWeighted?[58,48,33]:[65,50,35]}
function tierOf(w){const c=getCT();return w>=c[0]?['S','#4ade80']:w>=c[1]?['A','#60a5fa']:w>=c[2]?['B','#d97706']:['C','#f87171']}
function tierTag(w){const c=getCT();return w>=c[0]?'T1':w>=c[1]?'T2':w>=c[2]?'T3':'T4'}
function wc(w){if(w<=25)return`hsl(0,55%,${18+w*.3}%)`;if(w<=40)return`hsl(${(w-25)*1.6},45%,25%)`;if(w<=50)return`hsl(${24+(w-40)*3.6},35%,24%)`;if(w<=65)return`hsl(${60+(w-50)*5.3},45%,24%)`;return`hsl(140,50%,${24+(w-65)*.4}%)`}
function tc(w){return w<15?'#f87171':w>80?'#4ade80':'#e2e8f0'}
function muc(w){return w>=70?'#4ade80':w>=55?'#60a5fa':w>=45?'#d97706':w>=30?'#f87171':'#ef4444'}
function pills(cards,color){return'<div style="display:flex;flex-wrap:wrap;gap:3px;margin:2px 0">'+cards.map(([c,n])=>'<span style="display:inline-block;background:'+color+'15;color:'+color+';border:1px solid '+color+'30;border-radius:10px;padding:1px 7px;font-size:10px;font-family:JetBrains Mono,monospace">'+c+' <span style="opacity:.5">×'+n+'</span></span>').join('')+'</div>'}
function closeDet(){document.getElementById('det').classList.remove('show');selCell=null;selDeck=null;render()}

function sort(){const m=document.getElementById('srt').value;
if(m==='az')sorted=[...decks].sort();
else if(m==='wd')sorted=[...decks].sort((a,b)=>getWR(b)-getWR(a));
else sorted=[...decks].sort((a,b)=>getWR(a)-getWR(b))}

function render(){
sort();
let fd=sorted;
if(filt)fd=fd.filter(d=>d.includes(filt.toLowerCase()));
if(archFilt)fd=fd.filter(d=>ARCH[d]===archFilt);
const rk=[...decks].sort((a,b)=>getWR(b)-getWR(a));
const tiers={t1:[],t2:[],t3:[],t4:[]};
const ct=getCT();
rk.forEach(d=>{const w=getWR(d);if(w>=ct[0])tiers.t1.push(d);else if(w>=ct[1])tiers.t2.push(d);else if(w>=ct[2])tiers.t3.push(d);else tiers.t4.push(d)});
const rdiv=document.getElementById('rank');
const wl=useWeighted?' (vs T1-T2 field)':' (flat avg)';
const tl=useWeighted?[['t1',`Tier 1 — Dominant (≥${ct[0]}%)`],['t2',`Tier 2 — Competitive (${ct[1]}-${ct[0]}%)`],['t3',`Tier 3 — Fringe (${ct[2]}-${ct[1]}%)`],['t4',`Tier 4 — Struggling (<${ct[2]}%)`]]:[['t1','Tier 1 — Dominant (≥65%)'],['t2','Tier 2 — Competitive (50-65%)'],['t3','Tier 3 — Fringe (35-50%)'],['t4','Tier 4 — Struggling (<35%)']];
let rh='';
tl.forEach(([tk,label])=>{
if(!tiers[tk].length)return;
rh+=`<div class="tier-label ${tk}">${label}${wl}</div><div class="tier-row">`;
tiers[tk].forEach(d=>{const w=getWR(d);
rh+=`<span class="rchip${hlDeck===d?' sel':''}" style="color:${tc(w)};background:${wc(w)}" data-d="${d}"><span style="opacity:.4">${rk.indexOf(d)+1}</span> ${d} <b>${w}%</b></span>`});
rh+='</div>'});
rdiv.innerHTML=rh;
rdiv.querySelectorAll('.rchip').forEach(c=>{c.onclick=()=>{hlDeck=hlDeck===c.dataset.d?'':c.dataset.d;hl.value=hlDeck;render()}});
const t=document.getElementById('mtx');
let h='<thead><tr><th></th>';
fd.forEach(d=>{h+=`<th class="ch${hlDeck===d?' hl':''}" data-d="${d}"><div>${d}</div></th>`});
h+=`<th class="ch"><div>${useWeighted?'T12wr':'avg'}</div></th></tr></thead><tbody>`;
fd.forEach(d1=>{
h+=`<tr><th class="rh${hlDeck===d1?' hl':''}" data-d="${d1}">${d1}</th>`;
fd.forEach(d2=>{
if(d1===d2){h+=`<td class="c mir" data-d="${d1}">—</td>`;return}
const k=d1+'|'+d2,v=M[k],w=v?v[0]:50,bg=wc(w),fg=tc(w);
const dim=(hlDeck&&hlDeck!==d1&&hlDeck!==d2)?'opacity:.15;':'';
const s=(selCell===k)?'sel':'';
h+=`<td class="c ${s}" style="background:${bg};color:${fg};${dim}" data-k="${k}">${Math.round(w)}</td>`});
const a=getWR(d1);h+=`<td class="avg" style="color:${tc(a)}">${a}%</td></tr>`});
h+='</tbody>';t.innerHTML=h;
document.querySelectorAll('th.rh,th.ch').forEach(th=>{
if(!th.dataset.d)return;
th.onclick=e=>{if(e.target.closest('td'))return;showDeckProfile(th.dataset.d)}});
document.querySelectorAll('td.mir').forEach(td=>{td.onclick=()=>{if(td.dataset.d)showDeckProfile(td.dataset.d)}});
document.querySelectorAll('td.c:not(.mir)').forEach(td=>{
td.onclick=()=>{selCell=td.dataset.k;selDeck=null;render();showMatchup(td.dataset.k)};
td.onmouseenter=e=>showTip(e,td.dataset.k);td.onmouseleave=hideTip})}

const ttip=document.getElementById('ttip');
function showTip(e,k){if(!k)return;const[d1,d2]=k.split('|'),v=M[k],w=v?v[0]:50;
const rv=M[d2+'|'+d1];
ttip.innerHTML=`<div class="tw" style="color:${tc(w)}">${w}%</div>
<div class="tl">${d1} (${ARCH[d1]||'?'}) vs ${d2} (${ARCH[d2]||'?'})</div>
<div class="tl">Reverse: ${rv?rv[0]:'?'}%</div>`;
ttip.classList.add('vis');ttip.style.left=Math.min(e.clientX+12,innerWidth-270)+'px';
ttip.style.top=Math.min(e.clientY+12,innerHeight-80)+'px'}
function hideTip(){ttip.classList.remove('vis')}

function showDeckProfile(d){
selDeck=d;selCell=null;
const det=document.getElementById('det');det.classList.add('show');
document.getElementById('det-label').textContent='Deck Profile';
const inner=document.getElementById('det-inner');
const wr=getWR(d),flat=A[d],wt=W[d]||flat;
const tl2=tierOf(wr);
let h=`<div style="display:flex;align-items:center;margin-bottom:8px">
<span class="tier-badge" style="background:${tl2[1]}20;color:${tl2[1]};border:1px solid ${tl2[1]}40">${tl2[0]}</span>
<h2 style="margin:0">${d}</h2></div>`;
h+=`<div class="sub">${ARCH[d]||'?'}</div>`;
h+=`<div style="display:flex;gap:16px;margin:10px 0 14px">`;
h+=`<div><div style="font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px">Flat Avg</div><div style="font-size:28px;font-weight:700;color:${tc(flat)};font-family:'JetBrains Mono'">${flat}%</div></div>`;
h+=`<div><div style="font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px">vs T1-T2</div><div style="font-size:28px;font-weight:700;color:${tc(wt)};font-family:'JetBrains Mono'">${wt}%</div></div>`;
const delta=(wt-flat).toFixed(1);
h+=`<div style="align-self:flex-end;padding-bottom:4px"><span style="font-size:12px;color:${wt<flat?'#f87171':'#4ade80'};font-family:'JetBrains Mono'">${delta>0?'+':''}${delta}pp</span></div>`;
h+=`</div>`;

h+=`<div class="sec">All Matchups (by meta tier)</div>`;
const byTier=[...decks].filter(x=>x!==d).sort((a,b)=>getWR(b)-getWR(a));
let curTier='';
byTier.forEach(vs=>{const oppW=getWR(vs);const t=tierTag(oppW);
const myWr=M[d+'|'+vs]?M[d+'|'+vs][0]:50;const c=muc(myWr);
if(t!==curTier){curTier=t;const tc2={'T1':'#4ade80','T2':'#60a5fa','T3':'#d97706','T4':'#f87171'}[t];
h+=`<div style="font-size:9px;font-weight:700;color:${tc2};letter-spacing:.8px;margin:10px 0 4px;padding:2px 0;border-bottom:1px solid ${tc2}20">${t}</div>`;}
h+=`<div class="mu-row" onclick="showMatchup('${d}|${vs}')">
<span class="mu-name">${vs}</span>
<div class="mu-bar"><div class="mu-fill" style="width:${myWr}%;background:${c}"></div></div>
<span class="mu-val" style="color:${c}">${myWr}%</span></div>`});
inner.innerHTML=h;render()}

function showMatchup(k){
selCell=k;selDeck=null;
const det=document.getElementById('det');det.classList.add('show');
document.getElementById('det-label').textContent='Matchup Detail';
const inner=document.getElementById('det-inner');
const[d1,d2]=k.split('|');
const v=M[k],w=v?v[0]:50;
const rv=M[d2+'|'+d1],rw=rv?rv[0]:50;
const p1=DA[d1]||{},p2=DA[d2]||{},ev=I[k]||{},cd=C[k]||{};
let h=`<h2>${d1} <span style="color:var(--tx3)">vs</span> ${d2}</h2>`;
h+=`<div class="sub">${p1.type||ARCH[d1]||'?'} vs ${p2.type||ARCH[d2]||'?'} · 50 games</div>`;
h+=`<div style="font-size:36px;font-weight:700;color:${tc(w)};font-family:'JetBrains Mono';margin:4px 0 8px">${w}%</div>`;
h+=`<div class="row"><span class="lbl">Reverse (${d2} vs ${d1})</span><span class="val" style="color:${tc(rw)}">${rw}%</span></div>`;
h+=`<div class="row"><span class="lbl">Symmetry check</span><span class="val">${(w+rw).toFixed(1)}%</span></div>`;
if(cd.f&&cd.f.length){
h+=`<div class="sec">How ${d1} Wins</div>`;
cd.f.forEach(([card,n])=>{h+=`<div class="fin-row"><span class="fin-count">${n}</span><div><span class="fin-card">${card}</span></div></div>`});}
h+=`<div class="sec">Key Cards — ${d1}</div>`;
if(cd.c1)h+=pills(cd.c1,'#6a8dae');
if(cd.a1&&cd.a1.length){h+='<div style="font-size:9px;color:var(--tx3);margin:4px 0 2px">ATTACKERS</div>';h+=pills(cd.a1,'#7b8a6e');}
if(cd.dm1&&cd.dm1.length){h+='<div style="font-size:9px;color:var(--tx3);margin:4px 0 2px">DAMAGE</div>';h+=pills(cd.dm1,'#a04040');}
h+=`<div class="sec">Key Cards — ${d2}</div>`;
if(cd.c2)h+=pills(cd.c2,'#6a8dae');
if(cd.a2&&cd.a2.length){h+='<div style="font-size:9px;color:var(--tx3);margin:4px 0 2px">ATTACKERS</div>';h+=pills(cd.a2,'#7b8a6e');}
if(cd.dm2&&cd.dm2.length){h+='<div style="font-size:9px;color:var(--tx3);margin:4px 0 2px">DAMAGE</div>';h+=pills(cd.dm2,'#a04040');}
if(p1.plan||p2.plan){h+=`<div class="sec">Game Plans</div>`;
if(p1.plan)h+=`<div class="dp"><span class="dn">${d1}</span><span class="dt">${p1.type||''}</span><div class="dpl">${p1.plan}</div></div>`;
if(p2.plan)h+=`<div class="dp"><span class="dn">${d2}</span><span class="dt">${p2.type||''}</span><div class="dpl">${p2.plan}</div></div>`;}
const hasEvents=ev.p||ev.l||ev.r||ev.x;
if(hasEvents){
h+=`<div class="sec">What Happens</div>`;
if(ev.l&&ev.l.length){h+=`<div class="ecat" style="color:var(--orn)">🔒 Lock / Hate</div>`;
ev.l.forEach(([t,n])=>{h+=`<div class="evt"><span class="et">${t}</span><span class="en">${n}/20</span></div>`});}
if(ev.r&&ev.r.length){h+=`<div class="ecat" style="color:var(--red)">⚔️ Removal</div>`;
ev.r.forEach(([t,n])=>{h+=`<div class="evt"><span class="et">${t}</span><span class="en">${n}×</span></div>`});}
if(ev.x&&ev.x.length){h+=`<div class="ecat" style="color:var(--acc)">🛡️ Counters</div>`;
ev.x.forEach(([t,n])=>{h+=`<div class="evt"><span class="et">${t}</span><span class="en">${n}×</span></div>`});}
if(ev.p&&ev.p.length){h+=`<div class="ecat" style="color:var(--grn)">⚡ Pivotal</div>`;
ev.p.forEach(([t,n])=>{h+=`<div class="evt"><span class="et">${t}</span><span class="en">${n}/20</span></div>`});}
}
if(!cd.c1&&!hasEvents){h+=`<div style="margin-top:12px;padding:10px;background:var(--bg3);border-radius:4px;font-size:11px;color:var(--tx3)">Card-level data not yet extracted for this matchup. Run extract_cards.py to populate.</div>`;}
inner.innerHTML=h;render()}

document.getElementById('srt').onchange=render;
document.getElementById('flt').oninput=e=>{filt=e.target.value;render()};
document.getElementById('archFlt').onchange=e=>{archFilt=e.target.value;render()};
document.getElementById('hl').onchange=e=>{hlDeck=e.target.value;render()};
document.getElementById('wtToggle').onchange=e=>{useWeighted=e.target.checked;render()};
document.addEventListener('mousemove',e=>{if(ttip.classList.contains('vis')){
ttip.style.left=Math.min(e.clientX+12,innerWidth-270)+'px';
ttip.style.top=Math.min(e.clientY+12,innerHeight-80)+'px'}});
render();
</script></body></html>
